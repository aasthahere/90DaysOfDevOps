name: reusable workflow
on:
  workflow_call:
    inputs:
      app_name:
        type: string
        required: true
      environment:
        type: string
        required: true
        default: staging
    secrets:
        docker_token:
          required: true
    outputs:
      build_version:
        description: "Generated build version"
        value: ${{ jobs.reusable.outputs.build_version }}
jobs:
  reusable:
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.version.outputs.build_version }}

    steps:
     - name: checkout the code
       uses: actions/checkout@v4

     - name: Print build info
       run: echo "Building ${{ inputs.app_name }} for ${{ inputs.environment }}"
     
     - name: Check Docker token
       run: |
        echo "Docker token is set: ${{ secrets.docker_token != '' }}"

     - name: Generate version
       id: version
       run: echo "build_version=v1.0-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      
