name: Scheduled Tasks

on:
  schedule:
    - cron: '30 2 * * 1'
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scheduled-job:
    runs-on: ubuntu-latest

    steps:
      - name: Show schedule trigger
        run: |
         echo "Triggered by schedule: ${{ github.event.schedule }}"

      - name: Health check
        run: curl -I https://example.com
