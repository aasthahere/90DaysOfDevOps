name: download artifact workflow

on:
  push:
     branches: main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate a log file
        run: |
          echo "created logs!" > build.txt
          echo "testing logsss!!" >> build.txt
          echo "tests pass successfully!" >> build.txt

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: testing-report
          path: build.txt        

  take:
      needs: build
      runs-on: ubuntu-latest
      steps:
        - name : downloading files
          uses:  actions/download-artifact@v4
          with:
            name: testing-report
            path: downloaded-files

        - name: print the downloaded file
          run: |
               echo "Print the downloaded file"
               cat downloaded-files/build.txt
     
        
