# Create a job that sets an output — e.g., today's date as a string
# Create a second job that reads that output and prints it
# Pass the value using outputs: and needs.<job>.outputs.<name>

name: creating job output

on:
  workflow_dispatch:

jobs:
   date:
     runs-on: ubuntu-latest
     outputs:
      todays_date: ${{ steps.set-date.outputs.date }}

     steps:
       - name: Set current date
         id: set-date   
         run: echo "date=$(date)" >> $GITHUB_OUTPUT

   show-date:
       runs-on: ubuntu-latest
       needs: date  
       steps:
         - name: Print date
           run: echo "Current date is:" ${{ needs.date.outputs.todays_date }}
