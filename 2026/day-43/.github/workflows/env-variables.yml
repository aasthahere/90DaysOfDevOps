name: Enviroment variables practiced
on:
  workflow_dispatch: 
  
env:
  APP_NAME: myapp
  
jobs:
  env-vari:
    env:
      ENVIRONMENT: staging
    runs-on: ubuntu-latest
    steps:
      - name: print all the env
        env:
           VERSION: 1.0.0
        run: |
          echo "workflow level enviroment:$APP_NAME"
          echo "job level enviroment:$ENVIRONMENT"
          echo "step level version:$VERSION"
          echo "commit id(sha):${{ github.sha }}"
          echo "user(Actor):${{ github.actor }}"
